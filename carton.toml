#:schema ./carton-schema.json

[package]
name = "carton"
version = "0.1.0"
edition = 17
authors = ["aufam"]
description = "C++ package manager and build system"
readme = "README.md"
repository = "https://github.com/aufam/carton"
homepage = "<todo>"
documentation = "<todo>"
license = "MIT"

[dependencies]
cpx = "0.1.0"
fmt = "12.1.0"
spdlog = { version = "1.17.0", default-features = false }
yyjson = "0.12.0"
toml11 = "4.4.0"
pfr = "1.88.0"
magic_enum = "0.9.7"
CLI11 = "2.6.1"
xxhash = "0.8.3"
http = { version = "0.41.0", features = ["full"], optional = true }
