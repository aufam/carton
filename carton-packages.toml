#:schema ./carton-packages-schema.json

#
# cpx
#
[cpx.package]
name = "cpx"
edition = 17

[cpx.lib]
git = "https://github.com/aufam/cpx"
tag = "v{version}"


#
# fmt
#
[fmt.package]
name = "fmt"
edition = 11

[fmt.lib]
git = "https://github.com/fmtlib/fmt"
tag = "{version}"
src = ["src/format.cc", "src/os.cc"]


#
# spdlog
#
[spdlog.package]
name = "spdlog"
edition = 11

[spdlog.lib]
git = "https://github.com/gabime/spdlog"
tag = "v{version}"
flags = ["public:-DSPDLOG_COMPILED_LIB"]

[spdlog.dependencies]
fmt = { version = "{fmt-version:11.2.0}", optional = true }
fmt-external-flag = { flags = ["public:-DSPDLOG_FMT_EXTERNAL"], optional = true }

[spdlog.features]
fmt = [] # already bundled in spdlog
fmt-external = ["dep:fmt", "dep:fmt-external-flag"]
default = ["fmt"]
nodefault = ["fmt-external"] # fetch fmt but don't expose it to users, but users must explicitly define fmt with the same version to use it, otherwise they can define fmt with a different version to use it, and spdlog will not be recompiled

#
# nlohmann_json
#
[nlohmann_json.package]
name = "nlohmann_json"
edition = 11

[nlohmann_json.lib]
url = "https://github.com/nlohmann/json/releases/download/v{version}/json.tar.xz"


#
# yyjson
#
[yyjson.package]
name = "yyjson"
edition = 11

[yyjson.lib]
git = "https://github.com/ibireme/yyjson"
tag = "{version}"
src = ["src/yyjson.c"]
inc = ["src"]


#
# rapidjson
#
[rapidjson.package]
name = "rapidjson"
edition = 11

[rapidjson.lib]
git = "https://github.com/Tencent/rapidjson"
tag = "v{version}"


#
# toml++
#
['toml++'.package]
name = "toml++"
edition = 17

['toml++'.lib]
git = "https://github.com/marzer/tomlplusplus"
tag = "v{version}"


#
# toml11
#
[toml11.package]
name = "toml11"
edition = 11

[toml11.lib]
git = "https://github.com/ToruNiina/toml11"
tag = "v{version}"


#
# yaml-cpp
#
[yaml-cpp.package]
name = "yaml-cpp"
edition = 11

[yaml-cpp.lib]
git = "https://github.com/jbeder/yaml-cpp"
tag = "yaml-cpp-{version}"


#
# Boost.PFR
#
[pfr.package]
name = "pfr"
edition = 14

[pfr.lib]
git = "https://github.com/boostorg/pfr"
tag = "boost-{version}"


#
# Magic Enum
#
[magic_enum.package]
name = "magic_enum"
edition = 17

[magic_enum.lib]
git = "https://github.com/Neargye/magic_enum"
tag = "v{version}"


#
# CLI11
#
[CLI11.package]
name = "CLI11"
edition = 11

[CLI11.lib]
git = "https://github.com/CLIUtils/CLI11"
tag = "v{version}"


#
# cpp-httplib
#
[httplib.package]
name = "httplib"
edition = 11

[httplib.lib]
git = "https://github.com/yhirose/cpp-httplib"
tag = "v{version}"
src = ["build/httplib.cc"]
inc = ["public:build"]
link-flags = ["-lpthread"]
pre = "python3 split.py -o build"

[httplib.dependencies]
ssl = { flags = ["public:-DCPPHTTPLIB_OPENSSL_SUPPORT"], link-flags = ["-lssl", "-lcrypto"], optional = true }
zlib = { flags = ["public:-DCPPHTTPLIB_ZLIB_SUPPORT"], link-flags = ["-lz"], optional = true }


#
# sha256
#
[sha256.package]
name = "sha256"
edition = 11

[sha256.lib]
git = "https://github.com/LekKit/sha256"
branch = "{version}"
src = ["sha256.c"]
inc = ["public:"]


#
# gtest
#
[gtest.package]
name = "gtest"
edition = 17

[gtest.lib]
url = "https://github.com/google/googletest/releases/download/v{version}/googletest-{version}.tar.gz"
src = ["googletest/src/gtest-all.cc"]
inc = ["public:googletest/include", "googletest"]

[gtest.dependencies]
'gtest-main' = { src = ["googletest/src/gtest_main.cc"] }


#
# onnxruntime
#
[onnx.package]
name = "onnx"
edition = 17

[onnx.lib]
url = "https://github.com/microsoft/onnxruntime/releases/download/v{version}/onnxruntime-linux-x64-{version}.tgz"

[onnx.dependencies]
default = { lib = ["lib/libonnxruntime.so.{version}"] }
cuda = {
    url = "https://github.com/microsoft/onnxruntime/releases/download/v{version}/onnxruntime-linux-x64-gpu-{version}.tgz",
    lib = ["lib/libonnxruntime.so.{version}"]
}


['onnx-cuda'.package]
name = "onnx-cuda"

['onnx-cuda'.lib]
url = "https://github.com/microsoft/onnxruntime/releases/download/v{version}/onnxruntime-linux-x64-gpu-{version}.tgz"
lib = ["lib/libonnxruntime.so.{version}"]


#
# catch2
#
[catch2.package]
name = "catch2"
edition = 14

[catch2.lib]
git = "https://github.com/catchorg/Catch2"
tag = "v{version}"
src = [
    "src/catch2/*.cpp",
    "src/catch2/benchmark/*.cpp",
    "src/catch2/benchmark/detail/*.cpp",
    "src/catch2/generators/*.cpp",
    "src/catch2/interfaces/*.cpp",
    "src/catch2/internal/*.cpp",
    "src/catch2/matchers/*.cpp",
    "src/catch2/matchers/internal/*.cpp",
    "src/catch2/reporters/*.cpp",
]
inc = ["public:src"]


