[ftxui.features]
default = ["screen", "dom", "component"]


#
# async_simple
#
[async_simple.package]
name = "async_simple"
edition = 20

[async_simple.lib]
git = "https://github.com/alibaba/async_simple"
tag = "v{version}"
inc = ["public:"]


#
# cpptrace
#
[cpptrace.package]
name = "cpptrace"
edition = 11

[cpptrace.lib]
git = "https://github.com/jeremy-rifkin/cpptrace"
tag = "v{version}"
src = [
    "src/*.cpp",
    "src/binary/*.cpp",
    "src/demangle/*.cpp",
    "src/jit/*.cpp",
    "src/platform/*.cpp",
    "src/snippets/*.cpp",
    "src/symbols/*.cpp",
    "src/unwind/*.cpp",
    "src/utils/*.cpp",
    "src/utils/io/*.cpp",
]


#
# redis
#
[redis.package]
name = "redis"
edition = 11

[redis.lib]
git = "https://github.com/sewenew/redis-plus-plus"
tag = "{version}"
src = [
    "src/sw/redis++/command.cpp",
    "src/sw/redis++/command_options.cpp",
    "src/sw/redis++/connection.cpp",
    "src/sw/redis++/connection_pool.cpp",
    "src/sw/redis++/crc16.cpp",
    "src/sw/redis++/errors.cpp",
    "src/sw/redis++/pipeline.cpp",
    "src/sw/redis++/redis.cpp",
    "src/sw/redis++/redis_cluster.cpp",
    "src/sw/redis++/redis_uri.cpp",
    "src/sw/redis++/reply.cpp",
    "src/sw/redis++/sentinel.cpp",
    "src/sw/redis++/shards.cpp",
    "src/sw/redis++/shards_pool.cpp",
    "src/sw/redis++/subscriber.cpp",
    "src/sw/redis++/transaction.cpp",
    "src/sw/redis++/patterns/redlock.cpp",
]
inc = [
    "public:src",
    "public:src/sw/redis++/no_tls",
    "public:src/sw/redis++/cxx17",
]
